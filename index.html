<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Weather report for all countries in Europe — current and next-day forecasts." />
    <title>Weather Report — Europe</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>

    <header class="site-header">
      <h1>Weather Report</h1>
      <p class="subtitle">Iryna Khadzko</p>
      <div class="header-decoration">
        <span title="Sun">☀️</span>
        <span title="Cloud">⛅</span>
        <span title="Rain">🌧️</span>
        <span title="Snow">❄️</span>
        <span title="Thunder">⛈️</span>
      </div>
    </header>

    <div class="toolbar">
      <div class="search-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input
          type="search"
          id="search"
          placeholder="Filter countries…"
          aria-label="Filter countries"
          autocomplete="off"
        />
      </div>
      <span class="count-badge" id="count">46 of 46 countries</span>
    </div>

    <main class="grid" id="grid" aria-live="polite">
      <!-- Rendered by app.js -->
    </main>

    <footer>
      <p>Mock data · Europe Weather Report · Iryna Khadzko</p>
    </footer>

    <script src="data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
